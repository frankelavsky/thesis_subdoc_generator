# variants.conf — one variant per line.
#
# Format:   name = part1, part2, part3, ...
# Parts:
#   title, keywords, abstract, acknowledgements, toc,
#   bio, references, discussion,
#   N        (full chapter, e.g. 1, 2, 9)
#   N.M      (chapter N, intro + section M only, e.g. 9.1)
#   all      (everything — this variant will NOT get a cover page)
#   
#   Reference:
#   4 - Chartability
#   5 - Data Navigator
#   6 - Skeleton
#   7 - Cross-perception
#   8 - Softerware
# Any variant whose parts list does not contain "all" gets a cover page
# added as its first page (with the archival URL and a contents summary).
#
# Tip: include "references" in any abridged variant that cites things,
# otherwise \cite{...} commands will render as "?".

2026-elavsky-dissertation = all

2026-thesis-committee_preview = title, keywords, abstract, toc, 1, 2, 3, 9, references

